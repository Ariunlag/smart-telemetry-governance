milestone: R0B
status: approved-for-engineering-foundation
supported_environment:
  python: "3.12"
required_commands:
  - "python -m pip install -r backend/requirements.lock"
  - "python -m ruff check backend"
  - "python -m ruff format --check backend"
  - "python -m mypy backend/app"
  - "python -m pytest backend/tests"
  - "alembic -c backend/alembic.ini heads"
  - "alembic -c backend/alembic.ini history"
  - "DATABASE_URL=sqlite:///./r0b-migration-check.db alembic -c backend/alembic.ini upgrade head"
  - "npm --prefix frontend ci"
  - "npm --prefix frontend run lint"
  - "npm --prefix frontend run build"
observable_outcomes:
  - "Lint, format check, type checks, unit tests, migration history/head/upgrade, frontend lint, and frontend build exit successfully."
  - "Health returns 200 and readiness returns 200 without an optional database."
  - "Readiness returns 503 when a required database is unavailable."
recovery_evidence:
  - "Migration failures are forward-fixed from a retained backup; no destructive reset is permitted."
  - "Application shutdown disposes database resources after modules stop."
