services:
  postgres:
    image: postgres:16
    container_name: smartmqtt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  influxdb:
    image: influxdb:2.7
    container_name: smartmqtt-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: ${DOCKER_INFLUXDB_INIT_MODE:?Set DOCKER_INFLUXDB_INIT_MODE in .env}
      DOCKER_INFLUXDB_INIT_USERNAME: ${DOCKER_INFLUXDB_INIT_USERNAME:?Set DOCKER_INFLUXDB_INIT_USERNAME in .env}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${DOCKER_INFLUXDB_INIT_PASSWORD:?Set DOCKER_INFLUXDB_INIT_PASSWORD in .env}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:?Set DOCKER_INFLUXDB_INIT_ADMIN_TOKEN in .env}
      DOCKER_INFLUXDB_INIT_ORG: ${DOCKER_INFLUXDB_INIT_ORG:?Set DOCKER_INFLUXDB_INIT_ORG in .env}
      DOCKER_INFLUXDB_INIT_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET:?Set DOCKER_INFLUXDB_INIT_BUCKET in .env}
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD-SHELL", "influx ping --host http://localhost:8086"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartmqtt-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  chromadb:
    image: chromadb/chroma:latest
    container_name: smartmqtt-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  influxdb_data:
  influxdb_config:
  chroma_data:
